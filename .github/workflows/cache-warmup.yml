name: Cache Warmup

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  warm-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Warm cache on every machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          PREFETCH_TOKEN: ${{ secrets.PREFETCH_TOKEN }}
          WEB_APP_NAME: ${{ vars.WEB_APP_NAME }}
        run: |
          set -euo pipefail

          if [ -z "${FLY_API_TOKEN:-}" ] || [ -z "${PREFETCH_TOKEN:-}" ] || [ -z "${WEB_APP_NAME:-}" ]; then
            echo "Missing FLY_API_TOKEN secret, PREFETCH_TOKEN secret, or WEB_APP_NAME repo variable"
            exit 1
          fi

          BASE_URL="https://${WEB_APP_NAME}.fly.dev"
          PREFETCH_URL="${BASE_URL}/internal/prefetch"

          MACHINE_IDS="$(flyctl machine list -a "$WEB_APP_NAME" | awk 'tolower($1) ~ /^[0-9a-f]{14,}$/ && tolower($2) != "destroyed" {print $1}')"
          echo "Resolved machine IDs: $MACHINE_IDS"

          if [ -z "$MACHINE_IDS" ]; then
            echo "No machines found for app $WEB_APP_NAME"
            exit 1
          fi

          for MID in $MACHINE_IDS; do
            echo "Warming machine $MID"

            MACHINE_STATE="$(flyctl machine status "$MID" -a "$WEB_APP_NAME" --json 2>/dev/null | grep -o '"state":"[^"]*"' | head -1 | cut -d'"' -f4 || echo "unknown")"
            echo "Machine $MID state: $MACHINE_STATE"
            if [ "$MACHINE_STATE" != "started" ]; then
              flyctl machine start "$MID" -a "$WEB_APP_NAME" || true
              sleep 5
            fi

            success=0
            for i in $(seq 1 25); do
              if curl --fail --show-error --silent \
                --retry 5 --retry-delay 2 --retry-all-errors \
                -X POST \
                -H "x-prefetch-token: $PREFETCH_TOKEN" \
                -H "fly-force-instance-id: $MID" \
                "$PREFETCH_URL"; then
                success=1
                break
              fi
              sleep 3
            done

            if [ "$success" -ne 1 ]; then
              echo "Failed to warm cache on machine $MID"
              exit 1
            fi

            curl --fail --show-error --silent \
              --retry 5 --retry-delay 2 --retry-all-errors \
              -H "fly-force-instance-id: $MID" \
              "$PREFETCH_URL"
          done
